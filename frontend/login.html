<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Movie Portal</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <a href="index.html" class="logo">MovieAI</a>
        </nav>
    </header>

    <main class="auth-container">
        <section class="login-box">
            <h1>Вхід у систему</h1>
            <form action="#" class="auth-form">
                <div class="form-group">
                    <label for="username">Логін</label>
                    <input type="text" id="username" name="username" required placeholder="Введіть логін">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                    <span class="error-msg">Невірний пароль</span> </div>
                <button type="submit" class="btn btn-primary">Увійти</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Movie Portal. Всі права захищені.</p>
    </footer>
</body>
</html>
