<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Details | MovieAI Lab</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">MovieAI Lab</a>
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="movies.html" class="is-active">Movies</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container detail-grid">
      <img class="detail-poster" data-detail-poster src="img/poster1.png" alt="Movie poster">
      <article>
        <p class="catalog-status" data-detail-status>Loading movie details...</p>
        <div data-detail-content hidden>
          <h1 data-detail-title>Movie title</h1>
          <p class="muted" data-detail-meta>Year and genres</p>
          <p data-detail-overview></p>
          <p class="rating" data-detail-rating>IMDb rating: <strong>N/A</strong></p>
          <section class="panel detail-panel">
            <h2>Cast / People</h2>
            <ul class="detail-people" data-detail-people></ul>
          </section>
        </div>
        <a class="btn btn-primary" href="movies.html">Back to catalog</a>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>&copy; 2026 MovieAI Lab.</p>
    </div>
  </footer>
  <script src="js/api.js"></script>
  <script src="js/detail-page.js"></script>
</body>
</html>
