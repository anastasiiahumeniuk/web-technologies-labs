<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Деталі фільму | MovieAI Lab</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">MovieAI Lab</a>
      <nav aria-label="Основна навігація">
        <ul class="nav-list">
          <li><a href="index.html">Головна</a></li>
          <li><a href="movies.html" class="is-active">Фільми</a></li>
          <li><a href="login.html">Вхід</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container detail-grid">
      <img class="detail-poster" data-detail-poster src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 480'%3E%3Crect width='320' height='480' fill='%231b263d'/%3E%3Crect x='24' y='24' width='272' height='432' rx='18' fill='%230f1829' stroke='%232c3a58' stroke-width='4'/%3E%3Ctext x='160' y='220' text-anchor='middle' fill='%23e8edf7' font-family='Segoe UI, Arial, sans-serif' font-size='30' font-weight='700'%3EMovieAI%3C/text%3E%3Ctext x='160' y='260' text-anchor='middle' fill='%23b6bfd1' font-family='Segoe UI, Arial, sans-serif' font-size='20'%3EПостер відсутній%3C/text%3E%3C/svg%3E" alt="Постер фільму">
      <article>
        <p class="catalog-status" data-detail-status>Завантаження деталей фільму...</p>
        <div data-detail-content hidden>
          <h1 data-detail-title>Назва фільму</h1>
          <p class="muted" data-detail-meta>Рік і жанри</p>
          <p data-detail-overview></p>
          <p class="rating" data-detail-rating>Рейтинг IMDb: <strong>Н/Д</strong></p>
          <section class="panel detail-panel">
            <h2>Актори / Учасники</h2>
            <ul class="detail-people" data-detail-people></ul>
          </section>
        </div>
        <a class="btn btn-primary" href="movies.html">Назад до каталогу</a>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>&copy; 2026 MovieAI Lab.</p>
    </div>
  </footer>
  <script src="js/api.js"></script>
  <script src="js/detail-page.js"></script>
</body>
</html>
