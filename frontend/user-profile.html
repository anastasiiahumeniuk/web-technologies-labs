<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Profile | MovieAI</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">MovieAI Lab</a>
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="movies.html">Movies</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
      <div class="container two-col">
      <article class="panel">
        <h1>User Profile</h1>
        <p><strong>Name:</strong> Anastasiia H.</p>
        <p><strong>Role:</strong> User</p>
        <p><strong>Email:</strong> student@example.com</p>
      </article>
      <article class="panel">
        <h2>Edit Profile</h2>
        <form class="simple-form" action="#">
          <label for="full-name">Full name</label>
          <input id="full-name" type="text" value="Anastasiia H.">
          <label for="user-role">Role</label>
          <select id="user-role">
            <option>User</option>
            <option>Admin</option>
          </select>
          <button class="btn btn-primary" type="submit">Save</button>
        </form>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>&copy; 2026 MovieAI Lab.</p>
    </div>
  </footer>
</body>
</html>
