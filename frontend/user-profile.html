<!doctype html>
<html lang="uk">
<head>

  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">MovieAI Lab</a>
      <nav aria-label="Основна навігація">
        <ul class="nav-list">

  <main class="section">
      <div class="container two-col">
      <article class="panel">
        <h1>Профіль користувача</h1>
        <p><strong>Ім'я:</strong> Anastasiia H.</p>
        <p><strong>Роль:</strong> Користувач</p>
        <p><strong>Електронна пошта:</strong> student@example.com</p>
      </article>
      <article class="panel">
        <h2>Редагування профілю</h2>
        <form class="simple-form" action="#">
          <label for="full-name">Повне ім'я</label>
          <input id="full-name" type="text" value="Anastasiia H.">
          <label for="user-role">Роль</label>
          <select id="user-role">
            <option>Користувач</option>
            <option>Адміністратор</option>
          </select>
          <button class="btn btn-primary" type="submit">Зберегти</button>
        </form>
      </article>
    </div>
