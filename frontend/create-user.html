<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Створення користувача | MovieAI Lab</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="index.html">MovieAI Lab</a>
      <nav aria-label="Основна навігація">
        <ul class="nav-list">
          <li><a href="index.html">Головна</a></li>
          <li><a href="movies.html">Фільми</a></li>
          <li><a href="login.html">Вхід</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="auth-shell">
        <h1>Створення користувача</h1>
        <form class="simple-form" action="#">
          <label for="new-name">Ім'я користувача</label>
          <input id="new-name" type="text" required>
          <label for="new-pass">Пароль</label>
          <input id="new-pass" type="password" required>
          <label for="new-role">Роль</label>
          <select id="new-role">
            <option>Користувач</option>
            <option>Адміністратор</option>
          </select>
          <button class="btn btn-primary" type="submit">Створити</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>&copy; 2026 MovieAI Lab.</p>
    </div>
  </footer>
</body>
</html>
